<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Davi Oliveira">
    <title>{% block title %}Davi Oliveira - Portfólio{% endblock %}</title>
    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="icon" type="image/x-icon" href="{% static 'images/icone_davi_oliveira.png' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="{% url 'core:home' %}">Davi Oliveira</a>
            </div>
            <button class="menu-toggle" aria-label="Abrir menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links">
                <li><a href="{% url 'core:sobre' %}" class="{% if request.resolver_match.url_name == 'sobre' %}active{% endif %}">Sobre</a></li>
                <li><a href="{% url 'core:competencias' %}" class="{% if request.resolver_match.url_name == 'competencias' %}active{% endif %}">Competências</a></li>
                <li><a href="{% url 'core:projetos' %}" class="{% if request.resolver_match.url_name == 'projetos' %}active{% endif %}">Projetos</a></li>
                <li><a href="{% url 'core:experiencias' %}" class="{% if request.resolver_match.url_name == 'experiencias' %}active{% endif %}">Experiências</a></li>
                <li><a href="{% url 'core:formacao' %}" class="{% if request.resolver_match.url_name == 'formacao' %}active{% endif %}">Formação</a></li>
                <li><a href="{% url 'core:contato' %}" class="{% if request.resolver_match.url_name == 'contato' %}active{% endif %}">Contato</a></li>
            </ul>
            <button class="palette-trigger" id="paletteTrigger" aria-label="Buscar (Ctrl+K)">
                <i class="fas fa-search"></i>
            </button>
        </nav>
    </header>

    <!-- Command Palette -->
    <div class="palette-overlay" id="paletteOverlay">
        <div class="palette" role="dialog" aria-label="Paleta de comandos">
            <div class="palette-input-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="paletteInput" placeholder="Buscar páginas, ações..." autocomplete="off">
                <kbd>ESC</kbd>
            </div>
            <ul class="palette-results" id="paletteResults"></ul>
        </div>
    </div>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="footer-content">
            <div class="social-links">
                <a href="mailto:seu@email.com" aria-label="Email"><i class="fas fa-envelope"></i><span>Email</span></a>
                <a href="https://github.com/seu-usuario" target="_blank" rel="noopener" aria-label="GitHub"><i class="fab fa-github"></i><span>GitHub</span></a>
                <a href="https://linkedin.com/in/seu-usuario" target="_blank" rel="noopener" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i><span>LinkedIn</span></a>
                <a href="https://instagram.com/seu-usuario" target="_blank" rel="noopener" aria-label="Instagram"><i class="fab fa-instagram"></i><span>Instagram</span></a>
            </div>
        </div>
    </footer>

    <script src="{% static 'js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
